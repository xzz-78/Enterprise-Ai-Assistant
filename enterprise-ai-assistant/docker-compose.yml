name: enterprise-ai-assistant

services:
  mysql:
    image: mysql:8.0
    container_name: eai-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: enterprise_ai
      MYSQL_USER: eai
      MYSQL_PASSWORD: eaipass
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-prootpass"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eai-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_USER: eai
      MYSQL_PASSWORD: eaipass
      MYSQL_DATABASE: enterprise_ai
      DATABASE_URL: mysql+pymysql://eai:eaipass@mysql:3306/enterprise_ai?charset=utf8mb4
      SECRET_KEY: docker-dev-secret-please-change-in-production
      OPENAI_API_KEY: ${OPENAI_API_KEY:-sk-your-openai-api-key}
      OPENAI_API_BASE: ${OPENAI_API_BASE:-https://api.openai.com/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-3.5-turbo}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-ada-002}
      HOST: 0.0.0.0
      PORT: "8000"
    ports:
      - "8000:8000"
    volumes:
      - backend_uploads:/app/uploads
      - backend_faiss:/app/faiss_index

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: eai-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  mysql_data:
  backend_uploads:
  backend_faiss:
